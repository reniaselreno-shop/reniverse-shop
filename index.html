<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reniverse Shop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #111;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            object-fit: cover;
        }
        .card h3 {
            font-size: 1.1rem;
            margin: 15px 0 10px 0;
            color: #222;
        }
        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #10b981;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 6px;
            width: 100%;
        }
        .btn:hover {
            background-color: #222;
        }
        .error, .loading {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Reniverse Shop</h1>
        <div id="loading" class="loading">Cargando tus productos de Printify...</div>
        <div id="productos-grid" class="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('productos-grid');
        const loading = document.getElementById('loading');

        // Llamamos al puente seguro de tu Netlify
        fetch('https://netlify.app')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Error en la respuesta del servidor puente');
                }
                return response.json();
            })
            .then(res => {
                loading.style.display = 'none';
                
                // Printify devuelve los artículos dentro de un arreglo llamado "data"
                const productos = res.data || [];
                
                if (productos.length === 0) {
                    grid.innerHTML = '<p class="error">No se encontraron productos en esta tienda de Printify.</p>';
                    return;
                }

                productos.forEach(prod => {
                    // Tomamos la primera imagen promocional disponible (mockup)
                    const imagenUrl = prod.images && prod.images.length > 0 ? prod.images[0].src : 'https://placeholder.com';
                    
                    // Convertimos el precio base centavos a un formato legible (ej: 1500 centavos -> $15.00)
                    // Tomamos el precio de la primera variante disponible
                    const precioBase = prod.variants && prod.variants.length > 0 ? (prod.variants[0].price / 100).toFixed(2) : '0.00';

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${imagenUrl}" alt="${prod.title}">
                        <h3>${prod.title}</h3>
                        <p class="price">$${precioBase}</p>
                        <button class="btn">Ver detalles</button>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                console.error(error);
                loading.style.display = 'none';
                grid.innerHTML = `
                    <div class="error">
                        <p>❌ Hubo un error al cargar la tienda.</p>
                        <p style="font-size: 0.9rem; color: #666;">Detalle: ${error.message}</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
