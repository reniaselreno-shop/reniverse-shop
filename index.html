<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reniverse Shop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://gstatic.com');
            background-repeat: repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #111;
            background-color: rgba(255, 255, 255, 0.85);
            display: table;
            margin: 0 auto 30px auto;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background: rgba(255, 255, 255, 0.93);
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .card img {
            max-width: 100%;
            height: 200px;
            border-radius: 12px;
            object-fit: cover;
            background-color: #fff;
        }
        .card h3 {
            font-size: 1.1rem;
            margin: 15px 0 10px 0;
            color: #222;
            height: 45px;
            overflow: hidden;
        }
        .price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #2e7d32;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #1b5e20;
        }
        .error, .loading {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .error {
            color: #c62828;
        }

        /* Estilos de la Ventana Flotante (Modal) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            overflow-y: auto;
        }
        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            padding: 25px;
            border-radius: 16px;
            width: 80%;
            max-width: 800px;
            position: relative;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .close-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
        }
        .close-btn:hover {
            color: #000;
        }
        .modal-left {
            flex: 1;
            min-width: 300px;
        }
        .modal-right {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        .main-modal-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .thumbnails-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .thumb-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .thumb-img:hover, .thumb-img.active {
            border-color: #2e7d32;
        }
        .modal-description {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Reniverse Shop</h1>
        <div id="loading" class="loading">🦌 Cargando tus productos renianos...</div>
        <div id="productos-grid" class="grid"></div>
    </div>

    <!-- Ventana Flotante (Detalles del Producto) -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div class="modal-left">
                <img id="modal-main-image" src="" alt="Imagen principal">
                <div id="modal-thumbnails" class="thumbnails-container"></div>
            </div>
            <div class="modal-right">
                <h2 id="modal-title" style="margin-top:0;"></h2>
                <div id="modal-price" class="price" style="font-size: 1.6rem;"></div>
                <div id="modal-description" class="modal-description"></div>
                <button class="btn" id="add-to-cart-btn" style="margin-top: auto;">🛒 Agregar al Carrito</button>
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('productos-grid');
        const loading = document.getElementById('loading');
        
        // Elementos del Modal
        const modal = document.getElementById('product-modal');
        const closeModal = document.getElementById('close-modal');
        const modalMainImage = document.getElementById('modal-main-image');
        const modalThumbnails = document.getElementById('modal-thumbnails');
        const modalTitle = document.getElementById('modal-title');
        const modalPrice = document.getElementById('modal-price');
        const modalDescription = document.getElementById('modal-description');
        const addToCartBtn = document.getElementById('add-to-cart-btn');

        let productosCargados = [];

        fetch('/.netlify/functions/obtener-productos')
            .then(response => {
                if (!response.ok) {
                    throw new Error('El puente del servidor no respondió correctamente.');
                }
                return response.json();
            })
            .then(res => {
                loading.style.display = 'none';
                
                if (res && res.data) {
                    productosCargados = res.data;
                } else if (Array.isArray(res)) {
                    productosCargados = res;
                } else if (res && typeof res === 'object') {
                    productosCargados = res.current_page_items || [];
                }
                
                if (productosCargados.length === 0) {
                    grid.innerHTML = '<div class="error"><p>No se encontraron productos en tu tienda de Printify.</p></div>';
                    return;
                }

                productosCargados.forEach((prod, index) => {
                    let imagenUrl = 'https://placeholder.com';
                    if (prod.images && prod.images.length > 0) {
                        imagenUrl = prod.images[0].src || prod.images[0] || imagenUrl;
                    }
                    
                    let precioBase = '0.00';
                    if (prod.variants && prod.variants.length > 0) {
                        const precioOriginal = prod.variants[0].price || prod.variants[0].cost || 0;
                        precioBase = (precioOriginal / 100).toFixed(2);
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${imagenUrl}" alt="${prod.title || 'Producto'}">
                        <h3>${prod.title || 'Sin título'}</h3>
                        <p class="price">$${precioBase}</p>
                        <button class="btn" onclick="abrirDetalles(${index})">🔍 Ver más</button>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                console.error(error);
                loading.style.display = 'none';
                grid.innerHTML = `<div class="error"><p>❌ Error: ${error.message}</p></div>`;
            });

        // Función para abrir la ventana flotante con los mockups completos
        window.abrirDetalles = function(index) {
            const prod = productosCargados[index];
            if (!prod) return;

            modalTitle.innerText = prod.title || 'Producto';
            modalDescription.innerHTML = prod.description || 'Sin descripción disponible por el momento.';
            
            let precioBase = '0.00';
            if (prod.variants && prod.variants.length > 0) {
                precioBase = (prod.variants[0].price / 100).toFixed(2);
            }
            modalPrice.innerText = `$${precioBase}`;

// Limpiar fotos anterioresmodalThumbnails.innerHTML = '';// Cargar Mockups dinámicamenteif (prod.images && prod.images.length > 0) {modalMainImage.src = prod.images[0].src || prod.images[0];prod.images.forEach((img, i) => {const imgSrc = img.src || img;const thumb = document.createElement('img');thumb.className = 'thumb-img' + (i === 0 ? ' active' : '');thumb.src = imgSrc;// Al hacer clic en una miniatura cambia la foto grandethumb.onclick = function() {document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));thumb.classList.add('active');modalMainImage.src = imgSrc;};modalThumbnails.appendChild(thumb);});} else {modalMainImage.src = 'placeholder.com';}// Guardar ID en el botón de agregaraddToCartBtn.onclick = function() {alert(¡Añadido al carrito! ID Variant: ${prod.variants ? prod.variants[0].id : 'N/A'});};modal.style.display = 'block';};// Cerrar Ventana FlotantecloseModal.onclick = function() {modal.style.display = 'none';};window.onclick = function(event) {if (event.target === modal) {modal.style.display = 'none';}};
