        const ID_TIENDA = "28159778"; 

        async function cargarProductos() {
            const url = `https://corsproxy.io{ID_TIENDA}/products.json`;
            const contenedor = document.getElementById('contenedor-productos');

            try {
                const respuesta = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!respuesta.ok) throw new Error('Error al conectar con Printify');

                const datos = await respuesta.json();
                contenedor.innerHTML = ''; // Limpiar mensaje de carga

                if(datos.data.length === 0) {
                    contenedor.innerHTML = '<p>No hay productos visibles en esta tienda.</p>';
                    return;
                }

                datos.data.forEach(producto => {
                    // Tomamos la primera imagen disponible del producto
                    const imagenUrl = producto.images[0] ? producto.images[0].src : 'https://placeholder.com';
                    // Tomamos el precio de la primera variante (dividido por 100 si viene en centavos)
                    const precio = (producto.variants[0].price / 100).toFixed(2);

                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-producto';
                    tarjeta.innerHTML = `
                        <img src="${imagenUrl}" alt="${producto.title}">
                        <h3>${producto.title}</h3>
                        <p>$${precio} USD</p>
                    `;
                    contenedor.append(tarjeta);
                });

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = '<p>Hubo un error al cargar los productos. Revisa tu Token e ID.</p>';
            }
        }

        // Ejecutar la función al cargar la página
        cargarProductos();
    </script>
