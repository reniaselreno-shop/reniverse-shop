<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reniverse Shop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTLGLFWsj2sYkBMIOkYsncyk46HsjGhN36mFOaDJg7rPDwjSulAimPNA6_N&s=10');
            background-repeat: repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #111;
            background-color: rgba(255, 255, 255, 0.85);
            display: table;
            margin: 0 auto 30px auto;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background: rgba(255, 255, 255, 0.93);
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            object-fit: cover;
            background-color: #fff;
        }
        .card h3 {
            font-size: 1.1rem;
            margin: 15px 0 10px 0;
            color: #222;
            height: 45px;
            overflow: hidden;
        }
        .price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #2e7d32;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #1b5e20;
        }
        .error, .loading {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .error {
            color: #c62828;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Reniverse Shop</h1>
        <div id="loading" class="loading">🎄 Cargando tus productos navideños...</div>
        <div id="productos-grid" class="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('productos-grid');
        const loading = document.getElementById('loading');

        // Llamamos a la función con el nombre correcto del archivo backend
        fetch('/.netlify/functions/printify')
            .then(response => {
                if (!response.ok) {
                    throw new Error('El puente del servidor no respondió correctamente.');
                }
                return response.json();
            })
            .then(res => {
                loading.style.display = 'none';
                
                // Printify devuelve los productos directamente en la propiedad .data
                // o directo en la raíz del JSON según la configuración del backend
                const productos = res.data || res || [];
                
                if (!Array.isArray(productos) || productos.length === 0) {
                    grid.innerHTML = '<div class="error"><p>No se encontraron productos en tu tienda de Printify.</p><p style="font-size:0.9rem;color:#666;">Asegúrate de tener al menos un artículo creado en tu panel de Printify.</p></div>';
                    return;
                }

                productos.forEach(prod => {
                    const imagenUrl = prod.images && prod.images.length > 0 ? prod.images[0].src : 'https://placeholder.com';
                    const precioBase = prod.variants && prod.variants.length > 0 ? (prod.variants[0].price / 100).toFixed(2) : '0.00';

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${imagenUrl}" alt="${prod.title}">
                        <h3>${prod.title}</h3>
                        <p class="price">$${precioBase}</p>
                        <button class="btn">Comprar Ahora</button>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                console.error(error);
                loading.style.display = 'none';
                grid.innerHTML = `
                    <div class="error">
                        <p>❌ Error al conectar con Printify.</p>
                        <p style="font-size: 0.9rem; color: #666;">Causa técnica: ${error.message}</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
